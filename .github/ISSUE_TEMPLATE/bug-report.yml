name: Bug report
description: Report a reproducible problem in the public surface or documented local setup.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        Before filing, confirm that you checked the live surface and the current docs:
        - https://ai-blogersite.vercel.app/
        - `README.md`
        - `docs/launch-checklist.md`
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Public site
        - RSS feed
        - Health route
        - Local setup
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide exact steps, route, and environment.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Logs, screenshots, or response payloads
      description: Add concrete evidence when possible.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I did not include secrets or vulnerability details in this public issue.
          required: true
