name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Build, deploy, and smoke-test production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      MIRO_SITE_URL: ${{ secrets.MIRO_SITE_URL }}
    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail

          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build prebuilt deployment
        run: npx vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel production
        id: deploy
        run: |
          set -euo pipefail

          deployment_url="$(npx vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}")"
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Deployment URL: ${deployment_url}"

      - name: Decide smoke target
        id: smoke_target
        run: |
          set -euo pipefail

          if [ -n "${MIRO_SITE_URL:-}" ]; then
            target="${MIRO_SITE_URL%/}"
          else
            target="${{ steps.deploy.outputs.deployment_url }}"
          fi

          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "Smoke target: ${target}"

      - name: Smoke-test production routes
        env:
          TARGET_URL: ${{ steps.smoke_target.outputs.target }}
        run: |
          set -euo pipefail
          bash "./pre-launch-check.sh" "${TARGET_URL}"

      - name: Write deployment summary
        env:
          TARGET_URL: ${{ steps.smoke_target.outputs.target }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "- Commit: \`${{ github.event.workflow_run.head_sha || github.sha }}\`"
            echo "- Smoke target: ${TARGET_URL}"
            echo "- Vercel deployment: ${DEPLOYMENT_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
