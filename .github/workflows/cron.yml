name: Miro Cron Trigger

on:
  schedule:
    - cron: "0,30 4-17 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      strategy:
        description: "Manual run strategy"
        required: true
        default: "urgent_override"
        type: choice
        options:
          - urgent_override
          - editorial_schedule
          - round_robin
          - random
      topic:
        description: "Optional forced topic"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - sports
          - markets_fx
          - markets_crypto
          - tech_world
          - world

permissions:
  contents: read
  issues: write

concurrency:
  group: miro-cron-trigger
  cancel-in-progress: false

jobs:
  trigger:
    name: Trigger production cron endpoint
    if: github.event_name == 'workflow_dispatch' || vars.MIRO_CRON_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Invoke /api/cron
        env:
          MIRO_SITE_URL: ${{ secrets.MIRO_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          MIRO_EVENT_NAME: ${{ github.event_name }}
          MIRO_MANUAL_STRATEGY: ${{ inputs.strategy }}
          MIRO_MANUAL_TOPIC: ${{ inputs.topic }}
          MIRO_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash "scripts/trigger-cron.sh"
        id: cron_response

      - name: Write step summary
        env:
          CRON_STATUS: ${{ steps.cron_response.outputs.status }}
          PRODUCT_OUTCOME: ${{ steps.cron_response.outputs.product_outcome }}
          BENIGN_SKIP: ${{ steps.cron_response.outputs.benign_skip }}
          FRESHNESS_STATUS: ${{ steps.cron_response.outputs.freshness_status }}
          STALE_HEALTH: ${{ steps.cron_response.outputs.stale_health }}
          CRON_TOPIC: ${{ steps.cron_response.outputs.topic }}
          TRACE_ID: ${{ steps.cron_response.outputs.trace_id }}
          POST_ID: ${{ steps.cron_response.outputs.post_id }}
          TELEGRAM_STATUS: ${{ steps.cron_response.outputs.telegram_status }}
          CRON_REASON: ${{ steps.cron_response.outputs.reason }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## Miro cron result"
            echo ""
            echo "- Status: ${CRON_STATUS}"
            echo "- Product outcome: ${PRODUCT_OUTCOME}"
            echo "- Benign skip: ${BENIGN_SKIP}"
            echo "- Publish freshness: ${FRESHNESS_STATUS}"
            echo "- Stale health: ${STALE_HEALTH}"
            echo "- Topic: ${CRON_TOPIC}"
            echo "- Trace: \`${TRACE_ID}\`"
            echo "- Post: \`${POST_ID}\`"
            echo "- Telegram: ${TELEGRAM_STATUS}"
            echo "- Workflow: ${WORKFLOW_URL}"
            if [ -n "${CRON_REASON}" ]; then
              echo "- Reason: ${CRON_REASON}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Mark product warning
        if: steps.cron_response.outputs.product_outcome != 'published' || steps.cron_response.outputs.stale_health == 'true'
        env:
          PRODUCT_OUTCOME: ${{ steps.cron_response.outputs.product_outcome }}
          FRESHNESS_STATUS: ${{ steps.cron_response.outputs.freshness_status }}
          CRON_REASON: ${{ steps.cron_response.outputs.reason }}
        run: |
          escape_workflow_command() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "${value}"
          }

          safe_reason="$(escape_workflow_command "${CRON_REASON}")"
          echo "::warning title=Miro product warning::outcome=${PRODUCT_OUTCOME}, freshness=${FRESHNESS_STATUS}, reason=${safe_reason}"

      - name: Open freshness incident issue
        if: steps.cron_response.outputs.stale_health == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRODUCT_OUTCOME: ${{ steps.cron_response.outputs.product_outcome }}
          FRESHNESS_STATUS: ${{ steps.cron_response.outputs.freshness_status }}
          TRACE_ID: ${{ steps.cron_response.outputs.trace_id }}
          CRON_REASON: ${{ steps.cron_response.outputs.reason }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          title="Miro freshness incident: publish freshness ${FRESHNESS_STATUS}"
          existing="$(gh issue list --state open --search "Miro freshness incident in:title" --json number --jq '.[0].number // empty')"

          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "$(printf '%s\n%s\n%s\n%s\n%s' \
              'Freshness is still degraded.' \
              "Product outcome: ${PRODUCT_OUTCOME}" \
              "Trace: ${TRACE_ID}" \
              "Reason: ${CRON_REASON}" \
              "Workflow: ${WORKFLOW_URL}" \
            )"
            exit 0
          fi

          gh issue create \
            --title "${title}" \
            --body "$(printf '%s\n%s\n%s\n%s\n%s\n%s' \
              'Production health says publishing is stale. Treat this as an incident until a fresh successful post lands.' \
              "Product outcome: ${PRODUCT_OUTCOME}" \
              "Publish freshness: ${FRESHNESS_STATUS}" \
              "Trace: ${TRACE_ID}" \
              "Reason: ${CRON_REASON}" \
              "Workflow: ${WORKFLOW_URL}" \
            )"

      - name: Alert on skipped
        if: steps.cron_response.outputs.status == 'skipped'
        env:
          TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          CRON_TOPIC: ${{ steps.cron_response.outputs.topic }}
          TRACE_ID: ${{ steps.cron_response.outputs.trace_id }}
          CRON_REASON: ${{ steps.cron_response.outputs.reason }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_ALERT_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
            echo "Telegram ops alert skipped: TELEGRAM_ALERT_BOT_TOKEN / TELEGRAM_ALERT_CHAT_ID not configured."
            exit 0
          fi

          message="$(printf '%s\n%s\n%s\n%s\n%s' \
            '⏸ Miro skipped a slot' \
            "Topic: ${CRON_TOPIC}" \
            "Trace: ${TRACE_ID}" \
            "Reason: ${CRON_REASON}" \
            "Workflow: ${WORKFLOW_URL}" \
          )"

          curl \
            --silent \
            --show-error \
            --fail \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_ALERT_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_ALERT_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "disable_web_page_preview=true" \
            >/dev/null

      - name: Alert on Telegram delivery warning
        if: steps.cron_response.outputs.status == 'success' && steps.cron_response.outputs.telegram_status == 'failed'
        env:
          TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          CRON_TOPIC: ${{ steps.cron_response.outputs.topic }}
          TRACE_ID: ${{ steps.cron_response.outputs.trace_id }}
          POST_ID: ${{ steps.cron_response.outputs.post_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_ALERT_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
            echo "Telegram ops alert skipped: TELEGRAM_ALERT_BOT_TOKEN / TELEGRAM_ALERT_CHAT_ID not configured."
            exit 0
          fi

          message="$(printf '%s\n%s\n%s\n%s\n%s' \
            '⚠️ Miro saved a post but Telegram delivery failed' \
            "Topic: ${CRON_TOPIC}" \
            "Trace: ${TRACE_ID}" \
            "Post ID: ${POST_ID}" \
            "Workflow: ${WORKFLOW_URL}" \
          )"

          curl \
            --silent \
            --show-error \
            --fail \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_ALERT_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_ALERT_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "disable_web_page_preview=true" \
            >/dev/null

      - name: Fail missed publish slot
        if: steps.cron_response.outputs.status == 'skipped' && steps.cron_response.outputs.benign_skip != 'true'
        env:
          CRON_REASON: ${{ steps.cron_response.outputs.reason }}
        run: |
          escape_workflow_command() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "${value}"
          }

          safe_reason="$(escape_workflow_command "${CRON_REASON}")"
          echo "::error title=Miro missed publish slot::${safe_reason}"
          exit 1
