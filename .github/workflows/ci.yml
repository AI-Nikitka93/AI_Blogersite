name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx', 'src/**/*.ts', 'src/**/*.tsx', 'public/**', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Detect lint script
        id: lint_script
        run: |
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.lint ? 0 : 1)"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Next.js route types
        run: npx next typegen

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        if: steps.lint_script.outputs.present == 'true'
        run: npm run lint

      - name: Lint skipped
        if: steps.lint_script.outputs.present != 'true'
        run: echo "No lint script is defined in package.json; skipping lint."

      - name: Build
        run: npm run build
